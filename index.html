<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Cozenton Park Sports Centre - Fitness Class Timetable & Session Planner by JJM">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff5e36">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JJM Classes">
  
  <title>JJM Gym Classes - Cozenton Park</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Toast Notification -->
  <div id="toast" class="toast" role="alert">
    <span id="toastIcon" class="toast-icon">🔔</span>
    <span id="toastMsg" class="toast-msg">Notification</span>
  </div>

  <!-- Alarm Sound (generated inline) -->
  <audio id="alarmAudio" preload="auto"></audio>

  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <div class="brand">
          <div class="brand-circle">JJM</div>
          <div class="brand-text">
            <h1>Cozenton Park</h1>
            <span class="brand-sub">Fitness Class Timetable</span>
          </div>
        </div>
          <a href="https://www.medway.gov.uk/info/200333/cozenton_park_sports_centre_formerly_splashes/1890/cozenton_park_fitness_timetable" 
               target="_blank" rel="noopener" class="link-btn" title="View official Medway timetable">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
          <button id="exitBtn" class="exit-btn" title="Exit App">Exit</button>
      </div>

      <!-- Day Selector Tabs -->
      <div class="day-tabs" id="dayTabs" role="tablist">
        <button class="day-tab" data-day="0">Mon</button>
        <button class="day-tab" data-day="1">Tue</button>
        <button class="day-tab" data-day="2">Wed</button>
        <button class="day-tab" data-day="3">Thu</button>
        <button class="day-tab" data-day="4">Fri</button>
        <button class="day-tab" data-day="5">Sat</button>
        <button class="day-tab" data-day="6">Sun</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Filter chips -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" data-filter="all">All Classes</button>
        <button class="filter-chip" data-filter="selected">⭐ My Sessions</button>
      </div>

      <!-- Session Cards List -->
      <div class="session-list" id="sessionList">
        <!-- Dynamically rendered -->
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <span class="empty-icon">📋</span>
        <h3>No Sessions Found</h3>
        <p>No classes match your current filter for this day.</p>
      </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn active" data-view="timetable">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Timetable</span>
      </button>
      <button class="nav-btn" data-view="mysessions">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>My Plan</span>
      </button>
      
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Alarms</span>
      </button>
    </nav>

    <!-- My Sessions View (hidden by default) -->
    <section class="view-panel" id="viewMySessions" style="display:none;">
      <div class="view-header">
        <h2>⭐ My Weekly Plan</h2>
        <p class="view-sub">Your highlighted sessions across the week</p>
      </div>
      <div class="my-sessions-list" id="mySessionsList"></div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
